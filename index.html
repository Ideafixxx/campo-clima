<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clima del Campo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --tierra: #8B6914;
    --pasto: #4A7C3F;
    --cielo: #1B3A5C;
    --oro: #D4A843;
    --crema: #F5EDD8;
    --gris: #2C2C2C;
    --lluvia: #5B8DB8;
    --calor: #C0392B;
    --frio: #2980B9;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cielo);
    color: var(--crema);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(212,168,67,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(74,124,63,0.1) 0%, transparent 50%);
  }

  header {
    padding: 2rem 2rem 1rem;
    border-bottom: 1px solid rgba(212,168,67,0.2);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .header-title h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 4vw, 2rem);
    color: var(--oro);
    line-height: 1.1;
  }
  .header-title p {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: rgba(245,237,216,0.5);
    margin-top: 0.3rem;
    letter-spacing: 0.05em;
  }
  .coords-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    background: rgba(212,168,67,0.1);
    border: 1px solid rgba(212,168,67,0.3);
    color: var(--oro);
    padding: 0.4rem 0.8rem;
    border-radius: 4px;
    letter-spacing: 0.05em;
  }

  .loading {
    text-align: center;
    padding: 4rem 2rem;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(212,168,67,0.2);
    border-top-color: var(--oro);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: rgba(192,57,43,0.15);
    border: 1px solid rgba(192,57,43,0.4);
    color: #e87c6f;
    padding: 1rem 1.5rem;
    border-radius: 8px;
    margin: 2rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
  }

  main { padding: 1.5rem 2rem 3rem; max-width: 1100px; margin: 0 auto; }

  /* Hoy */
  .today-card {
    background: linear-gradient(135deg, rgba(212,168,67,0.12) 0%, rgba(74,124,63,0.08) 100%);
    border: 1px solid rgba(212,168,67,0.25);
    border-radius: 12px;
    padding: 1.5rem 2rem;
    margin-bottom: 1.5rem;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 1.5rem;
    align-items: center;
  }
  .today-temp {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 8vw, 4.5rem);
    color: var(--oro);
    line-height: 1;
  }
  .today-temp span { font-size: 0.4em; color: rgba(212,168,67,0.6); }
  .today-meta { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.8rem; }
  .meta-item { }
  .meta-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: rgba(245,237,216,0.4);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .meta-val {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--crema);
    margin-top: 0.2rem;
  }

  /* Sección títulos */
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--oro);
    margin-bottom: 0.8rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid rgba(212,168,67,0.15);
    letter-spacing: 0.02em;
  }

  /* Pronóstico 16 días */
  .forecast-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 0.6rem;
    margin-bottom: 2rem;
  }
  .day-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 0.8rem 0.6rem;
    text-align: center;
    transition: background 0.2s;
    cursor: default;
  }
  .day-card:hover { background: rgba(212,168,67,0.08); border-color: rgba(212,168,67,0.2); }
  .day-name {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: rgba(245,237,216,0.4);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .day-date {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: rgba(245,237,216,0.6);
    margin: 0.1rem 0 0.4rem;
  }
  .day-icon { font-size: 1.4rem; margin: 0.3rem 0; }
  .day-max { font-size: 1rem; font-weight: 500; color: #E8A87C; }
  .day-min { font-size: 0.8rem; color: #7CB8E8; margin-top: 0.1rem; }
  .day-rain {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--lluvia);
    margin-top: 0.4rem;
  }
  .day-rain-bar {
    height: 3px;
    background: rgba(91,141,184,0.15);
    border-radius: 2px;
    margin-top: 0.3rem;
    overflow: hidden;
  }
  .day-rain-fill {
    height: 100%;
    background: var(--lluvia);
    border-radius: 2px;
  }

  /* Gráficos simples */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 2rem;
  }
  @media (max-width: 600px) { .charts-row { grid-template-columns: 1fr; } }

  .chart-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 1rem 1.2rem 0.8rem;
  }
  .chart-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: rgba(245,237,216,0.4);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.8rem;
  }
  .bar-chart { display: flex; align-items: flex-end; gap: 3px; height: 70px; }
  .bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .bar {
    width: 100%;
    border-radius: 3px 3px 0 0;
    min-height: 2px;
    transition: opacity 0.2s;
  }
  .bar:hover { opacity: 0.7; }
  .bar-lbl {
    font-family: 'DM Mono', monospace;
    font-size: 0.45rem;
    color: rgba(245,237,216,0.3);
    white-space: nowrap;
  }

  /* Tabla agro */
  .agro-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
    margin-bottom: 2rem;
  }
  .agro-table th {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: rgba(245,237,216,0.4);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 0.5rem 0.8rem;
    text-align: right;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .agro-table th:first-child { text-align: left; }
  .agro-table td {
    padding: 0.45rem 0.8rem;
    text-align: right;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: rgba(245,237,216,0.7);
  }
  .agro-table td:first-child {
    text-align: left;
    color: rgba(245,237,216,0.5);
    font-size: 0.68rem;
  }
  .agro-table tr:hover td { background: rgba(255,255,255,0.02); }
  .val-high { color: #E8A87C !important; }
  .val-rain { color: #7CB8E8 !important; }
  .val-uv { color: #C0A060 !important; }

  footer {
    text-align: center;
    padding: 1rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: rgba(245,237,216,0.2);
    letter-spacing: 0.05em;
  }

  .model-badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    background: rgba(74,124,63,0.15);
    border: 1px solid rgba(74,124,63,0.3);
    color: #7CB87C;
    padding: 0.2rem 0.5rem;
    border-radius: 3px;
    margin-left: 0.4rem;
    vertical-align: middle;
  }

  .updated-at {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: rgba(245,237,216,0.3);
    margin-top: 0.3rem;
  }
</style>
</head>
<body>

<header>
  <div class="header-title">
    <h1>Previsión del Campo <span class="model-badge">Open-Meteo</span></h1>
    <p>Soriano / Río Negro · Uruguay</p>
    <p class="updated-at" id="updatedAt"></p>
  </div>
  <div class="coords-badge">33°40'38.4"S · 57°55'41.1"O</div>
</header>

<main>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="font-family:'DM Mono',monospace;font-size:0.75rem;color:rgba(245,237,216,0.4);">Consultando modelos meteorológicos…</p>
  </div>
  <div id="content" style="display:none"></div>
</main>

<footer>Datos: Open-Meteo · NOAA GFS · DWD ICON · ECMWF · Météo-France · Actualización horaria</footer>

<script>
const LAT = -33.677333;
const LON = -57.928083;

const DIAS_ES = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MESES_ES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

function fmtDate(str) {
  const d = new Date(str + 'T00:00:00');
  return `${DIAS_ES[d.getDay()]} ${d.getDate()} ${MESES_ES[d.getMonth()]}`;
}
function fmtDateShort(str) {
  const d = new Date(str + 'T00:00:00');
  return `${d.getDate()}/${d.getMonth()+1}`;
}
function dayName(str) {
  const d = new Date(str + 'T00:00:00');
  return DIAS_ES[d.getDay()];
}

function weatherIcon(wmoCode, rain) {
  if (wmoCode === 0) return '☀️';
  if (wmoCode <= 2) return '⛅';
  if (wmoCode <= 3) return '☁️';
  if (wmoCode <= 49) return '🌫️';
  if (wmoCode <= 67) return rain > 10 ? '🌧️' : '🌦️';
  if (wmoCode <= 77) return '🌨️';
  if (wmoCode <= 82) return '🌧️';
  if (wmoCode <= 99) return '⛈️';
  return '🌤️';
}

function windDir(deg) {
  const dirs = ['N','NE','E','SE','S','SO','O','NO'];
  return dirs[Math.round(deg / 45) % 8];
}

function renderContent(d) {
  const daily = d.daily;
  const today = 0;

  // Hoy
  const todayMaxT = daily.temperature_2m_max[today];
  const todayMinT = daily.temperature_2m_min[today];
  const todayRain = daily.precipitation_sum[today];
  const todayRainProb = daily.precipitation_probability_max[today];
  const todayWind = daily.windspeed_10m_max[today];
  const todayWindDir = windDir(daily.winddirection_10m_dominant[today]);
  const todayUV = daily.uv_index_max[today];
  const todayETo = daily.et0_fao_evapotranspiration[today];
  const todaySun = Math.round(daily.sunshine_duration[today] / 3600 * 10) / 10;
  const todayIcon = weatherIcon(daily.weathercode[today], todayRain);

  // Precipitación acumulada 7 y 16 días
  const rain7 = daily.precipitation_sum.slice(0, 7).reduce((a, b) => a + (b || 0), 0).toFixed(1);
  const rain16 = daily.precipitation_sum.reduce((a, b) => a + (b || 0), 0).toFixed(1);

  // Forecast cards
  let forecastHTML = '';
  for (let i = 0; i < daily.time.length; i++) {
    const mx = daily.temperature_2m_max[i];
    const mn = daily.temperature_2m_min[i];
    const rn = daily.precipitation_sum[i] || 0;
    const rp = daily.precipitation_probability_max[i] || 0;
    const ic = weatherIcon(daily.weathercode[i], rn);
    const isToday = i === 0;
    forecastHTML += `
      <div class="day-card" style="${isToday ? 'border-color:rgba(212,168,67,0.4);background:rgba(212,168,67,0.07)' : ''}">
        <div class="day-name">${isToday ? 'HOY' : dayName(daily.time[i])}</div>
        <div class="day-date">${fmtDateShort(daily.time[i])}</div>
        <div class="day-icon">${ic}</div>
        <div class="day-max">${mx !== null ? Math.round(mx) + '°' : '—'}</div>
        <div class="day-min">${mn !== null ? Math.round(mn) + '°' : '—'}</div>
        <div class="day-rain">${rn > 0.1 ? rn.toFixed(1) + 'mm' : rp > 20 ? rp + '%' : '—'}</div>
        <div class="day-rain-bar"><div class="day-rain-fill" style="width:${Math.min(rp, 100)}%"></div></div>
      </div>`;
  }

  // Barras de lluvia (16 días)
  const maxRain = Math.max(...daily.precipitation_sum.map(v => v || 0), 1);
  let rainBarsHTML = '';
  for (let i = 0; i < daily.time.length; i++) {
    const rn = daily.precipitation_sum[i] || 0;
    const h = Math.round((rn / maxRain) * 60);
    rainBarsHTML += `<div class="bar-wrap">
      <div class="bar" style="height:${Math.max(h,2)}px;background:var(--lluvia);opacity:${0.4 + (rn/maxRain)*0.6}" title="${rn}mm"></div>
      <div class="bar-lbl">${fmtDateShort(daily.time[i])}</div>
    </div>`;
  }

  // Barras de ETo
  const maxETo = Math.max(...daily.et0_fao_evapotranspiration.map(v => v || 0), 1);
  let etoBarsHTML = '';
  for (let i = 0; i < daily.time.length; i++) {
    const et = daily.et0_fao_evapotranspiration[i] || 0;
    const h = Math.round((et / maxETo) * 60);
    etoBarsHTML += `<div class="bar-wrap">
      <div class="bar" style="height:${Math.max(h,2)}px;background:#C8A040;opacity:${0.4 + (et/maxETo)*0.6}" title="${et}mm"></div>
      <div class="bar-lbl">${fmtDateShort(daily.time[i])}</div>
    </div>`;
  }

  // Tabla agro detallada (próximos 10 días)
  let tableRows = '';
  for (let i = 0; i < Math.min(10, daily.time.length); i++) {
    const mx = daily.temperature_2m_max[i];
    const mn = daily.temperature_2m_min[i];
    const rn = (daily.precipitation_sum[i] || 0).toFixed(1);
    const rp = daily.precipitation_probability_max[i] || 0;
    const ws = daily.windspeed_10m_max[i];
    const wd = windDir(daily.winddirection_10m_dominant[i]);
    const uv = daily.uv_index_max[i];
    const et = (daily.et0_fao_evapotranspiration[i] || 0).toFixed(1);
    const sun = Math.round((daily.sunshine_duration[i] || 0) / 3600 * 10) / 10;
    tableRows += `<tr>
      <td>${fmtDate(daily.time[i])}${i===0?' ← hoy':''}</td>
      <td class="val-high">${Math.round(mx)}°</td>
      <td style="color:#7CB8E8">${Math.round(mn)}°</td>
      <td class="${parseFloat(rn) > 0 ? 'val-rain' : ''}">${rn}</td>
      <td>${rp}%</td>
      <td>${Math.round(ws)} km/h ${wd}</td>
      <td class="val-uv">${uv}</td>
      <td>${et}</td>
      <td>${sun}h</td>
    </tr>`;
  }

  document.getElementById('updatedAt').textContent = `Actualizado: ${new Date().toLocaleString('es-AR')}`;

  return `
    <div class="today-card">
      <div>
        <div style="font-size:2.5rem;margin-bottom:0.3rem">${todayIcon}</div>
        <div class="today-temp">${Math.round((todayMaxT + todayMinT) / 2)}<span>°C</span></div>
        <div style="font-size:0.75rem;color:rgba(245,237,216,0.5);margin-top:0.2rem">
          <span style="color:#E8A87C">↑${Math.round(todayMaxT)}°</span>
          &nbsp;
          <span style="color:#7CB8E8">↓${Math.round(todayMinT)}°</span>
        </div>
      </div>
      <div class="today-meta">
        <div class="meta-item"><div class="meta-label">Lluvia hoy</div><div class="meta-val">${todayRain > 0 ? todayRain.toFixed(1) + ' mm' : 'Sin lluvia'}</div></div>
        <div class="meta-item"><div class="meta-label">Prob. lluvia</div><div class="meta-val">${todayRainProb}%</div></div>
        <div class="meta-item"><div class="meta-label">Viento máx.</div><div class="meta-val">${Math.round(todayWind)} km/h ${todayWindDir}</div></div>
        <div class="meta-item"><div class="meta-label">Índice UV</div><div class="meta-val">${todayUV}</div></div>
        <div class="meta-item"><div class="meta-label">ETo (Penman)</div><div class="meta-val">${todayETo ? todayETo.toFixed(1) + ' mm' : '—'}</div></div>
        <div class="meta-item"><div class="meta-label">Sol estimado</div><div class="meta-val">${todaySun} h</div></div>
        <div class="meta-item"><div class="meta-label">Lluvia 7 días</div><div class="meta-val">${rain7} mm</div></div>
        <div class="meta-item"><div class="meta-label">Lluvia 16 días</div><div class="meta-val">${rain16} mm</div></div>
      </div>
    </div>

    <p class="section-title">Pronóstico 16 días</p>
    <div class="forecast-grid">${forecastHTML}</div>

    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">💧 Precipitación diaria (mm)</div>
        <div class="bar-chart">${rainBarsHTML}</div>
      </div>
      <div class="chart-card">
        <div class="chart-title">🌿 Evapotranspiración ETo FAO-56 (mm)</div>
        <div class="bar-chart">${etoBarsHTML}</div>
      </div>
    </div>

    <p class="section-title">Detalle agronómico — próximos 10 días</p>
    <div style="overflow-x:auto">
      <table class="agro-table">
        <thead><tr>
          <th>Fecha</th>
          <th>T. Máx</th>
          <th>T. Mín</th>
          <th>Lluvia</th>
          <th>Prob.</th>
          <th>Viento</th>
          <th>UV</th>
          <th>ETo</th>
          <th>Sol</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
  `;
}

async function fetchWeather() {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,windspeed_10m_max,winddirection_10m_dominant,et0_fao_evapotranspiration,uv_index_max,sunshine_duration&timezone=America%2FMontevideo&forecast_days=16`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    document.getElementById('loading').style.display = 'none';
    const content = document.getElementById('content');
    content.style.display = 'block';
    content.innerHTML = renderContent(data);
  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    document.getElementById('content').innerHTML = `<div class="error-msg">⚠️ Error al cargar datos: ${err.message}<br><br>Revisá tu conexión a internet.</div>`;
  }
}

fetchWeather();
</script>
</body>
</html>
